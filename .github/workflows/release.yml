name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            platform: darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            platform: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force --timestamp=none target/${{ matrix.target }}/release/smfs

      - name: stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/smfs dist/smfs-${{ matrix.platform }}
          ( cd dist && shasum -a 256 smfs-${{ matrix.platform }} > smfs-${{ matrix.platform }}.sha256 )

      - uses: actions/upload-artifact@v4
        with:
          name: smfs-${{ matrix.platform }}
          path: dist/smfs-${{ matrix.platform }}*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: resolve version + prerelease
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: build manifest.json
        run: |
          cd dist
          sha() { awk '{print $1}' "smfs-$1.sha256"; }
          cat > manifest.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "platforms": {
              "darwin-arm64": { "checksum": "$(sha darwin-arm64)" },
              "darwin-x64":   { "checksum": "$(sha darwin-x64)" },
              "linux-x64":    { "checksum": "$(sha linux-x64)" },
              "linux-arm64":  { "checksum": "$(sha linux-arm64)" }
            }
          }
          EOF
          cat manifest.json

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: smfs ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/smfs-darwin-arm64
            dist/smfs-darwin-x64
            dist/smfs-linux-x64
            dist/smfs-linux-arm64
            dist/smfs-darwin-arm64.sha256
            dist/smfs-darwin-x64.sha256
            dist/smfs-linux-x64.sha256
            dist/smfs-linux-arm64.sha256
            dist/manifest.json
